  <link rel="preconnect" href="https://unpkg.com">

    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >

  <style>
    :root {
      --ink: #13251f;
      --muted: #65736e;
      --accent: #e8613a;
      --accent-dark: #b73e20;
      --line: rgba(19, 37, 31, 0.12);
      --shadow: 0 18px 45px rgba(16, 37, 30, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      color: var(--ink);
      background: #dce4df;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .leaflet-popup-content-wrapper {
      overflow: hidden;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .leaflet-popup-content {
      width: 260px !important;
      margin: 0;
    }

    .operation-popup {
      padding: 18px;
    }

    .operation-popup h2 {
      margin: 0 0 5px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.25rem;
      line-height: 1.2;
    }

    .operation-popup .location {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .operation-links {
      display: grid;
      gap: 8px;
      padding-top: 13px;
      border-top: 1px solid var(--line);
    }

    .operation-links a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      color: #fff;
      background: var(--ink);
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform 160ms ease, background 160ms ease;
    }

    .operation-links a::after {
      content: "↗";
      font-size: 1rem;
    }

    .operation-links a:hover,
    .operation-links a:focus-visible {
      transform: translateY(-1px);
      background: var(--accent-dark);
    }

    .leaflet-control-zoom {
      overflow: hidden;
      border: 0 !important;
      border-radius: 12px !important;
      box-shadow: 0 8px 24px rgba(19, 37, 31, 0.16) !important;
    }

    .leaflet-control-attribution {
      font-size: 10px;
    }

    @media (max-width: 640px) {
      .leaflet-control-zoom {
        margin-right: 12px !important;
        margin-bottom: 22px !important;
      }
    }
  </style>
</head>

    const map = L.map("map", {
      center: marcoZeroSP,
      zoom: 9,
      zoomControl: false
    });

    L.control.zoom({ position: "bottomright" }).addTo(map);

    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      referrerPolicy: "origin",
      attribution:
        'J3M IoT'
    }).addTo(map);

    function escaparHTML(valor) {
      const elemento = document.createElement("div");
      elemento.textContent = valor;
      return elemento.innerHTML;
    }

    function criarPopup(operacao) {
      const links = operacao.links
        .map(
          (link) => `
            <a
              href="${escaparHTML(link.url)}"
              target="_blank"
              rel="noopener noreferrer"
            >
              ${escaparHTML(link.nome)}
            </a>
          `
        )
        .join("");

      return `
        <article class="operation-popup">
          <h2>${escaparHTML(operacao.nome)}</h2>
          <p class="location">${escaparHTML(operacao.local)}</p>
          <div class="operation-links">${links}</div>
        </article>
      `;
    }

    operacoes.forEach((operacao) => {
      L.marker(operacao.coordenadas, {
        title: operacao.nome,
        alt: operacao.nome
      })
        .addTo(map)
        .bindPopup(criarPopup(operacao), {
          closeButton: false,
          maxWidth: 290,
          minWidth: 260
        });
    });
